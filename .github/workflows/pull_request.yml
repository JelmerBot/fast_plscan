name: pull_request
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  pre_build:
    name: Check file changes
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: read
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
      cache-key: ${{ steps.cache.outputs.cache-primary-key }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Install linters
        run: |
          uv sync --frozen --only-group lint --no-install-project
          echo "source $(uv env --bin)/activate" >> $GITHUB_ENV

      - name: Black (reviewdog)
        id: black
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          black --check --diff . \
            | reviewdog -f=diff \
                        -name=Black \
                        -reporter=github-pr-check \
                        -filter-mode=nofilter \
                        -fail-level=warning

      - name: Ruff (reviewdog)
        id: ruff
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check --output-format=rdjson src tests \
            | reviewdog -f=rdjson \
                        -name=Ruff \
                        -reporter=github-pr-check \
                        -filter-mode=nofilter \
                        -fail-level=warning

      - name: Check linter results
        if: always()
        run: |
          if [[ "${{ steps.black.outcome }}" != "success" || \
                "${{ steps.ruff.outcome }}" != "success" ]]; then
            echo "One or more linters failed or did not complete."
            exit 1
          fi

      # Skip build_wheels if no relevant files were changed
      - uses: actions/cache/restore@v5
        id: cache
        with:
          key: wheels-${{ hashFiles('src/**', 'tests/**', 'pyproject.toml', 'CMakeLists.txt', '.github/workflows/_build_wheels.yml') }}
          path: /dev/null
          lookup-only: true

  build_wheels:
    name: Build wheels
    needs: pre_build
    if: needs.pre_build.outputs.cache-hit != 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/_build_wheels.yml
    secrets: inherit

  pr_status:
    name: PR status
    needs: [pre_build, build_wheels]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Workflow Status
        run: |
          exit_on_result() {
            if [[ "$2" == "failure" || "$2" == "cancelled" ]]; then
              echo "Job '$1' failed or was cancelled."
              exit 1
            fi
          }
          exit_on_result "pre_build" "${{ needs.pre_build.result }}"
          exit_on_result "build_wheels" "${{ needs.build_wheels.result }}"
      - uses: actions/cache/save@v5
        if: needs.pre_build.outputs.cache-hit != 'true'
        with:
          key: ${{ needs.pre_build.outputs.cache-key }}
          path: /dev/null
